namespace: claude-code

# Default image (overridden per-project when using presets)
image:
  repository: claude-code
  tag: latest
  pullPolicy: IfNotPresent

claude:
  mode: daemon
  prompt: "Analyze this project and provide a summary."
  # Path to host ~/.claude/ directory (auto-detected by GUI)
  credentialsPath: ""

# Single project to deploy (one helm release per project)
project:
  name: ""
  path: ""
  image: ""

# Git configuration for pods
git:
  userName: "Claude Code Bot"
  userEmail: "claude-bot@localhost"

# Pod resource limits
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

# Extra host paths to mount into pods (SET-14)
extraMounts: []
# Example:
# extraMounts:
#   - /data/shared
#   - /home/user/datasets

nodeSelector: {}
tolerations: []

healthCheck:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
