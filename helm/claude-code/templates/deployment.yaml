{{- if .Values.project.name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-{{ include "claude-code.projectName" .Values.project.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "claude-code.labels" . | nindent 4 }}
    app.kubernetes.io/component: claude-pod
    claude-code/project: {{ include "claude-code.projectName" .Values.project.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "claude-code.name" . }}
      claude-code/project: {{ include "claude-code.projectName" .Values.project.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "claude-code.name" . }}
        claude-code/project: {{ include "claude-code.projectName" .Values.project.name }}
      annotations:
        claude-code/project-path: {{ .Values.project.path | quote }}
    spec:
      serviceAccountName: {{ include "claude-code.fullname" . }}
      containers:
        - name: claude-code
          image: {{ default (printf "%s:%s" .Values.image.repository .Values.image.tag) .Values.project.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CLAUDE_MODE
              value: {{ .Values.claude.mode | quote }}
            - name: CLAUDE_PROMPT
              value: {{ .Values.claude.prompt | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "claude-code.fullname" . }}-config
            - secretRef:
                name: env-{{ include "claude-code.projectName" .Values.project.name }}
                optional: true
          volumeMounts:
            - name: project-volume
              mountPath: /workspace
            - name: claude-home
              mountPath: /claude-data
            {{- if .Values.claude.credentialsPath }}
            - name: claude-credentials
              mountPath: /claude-host
              readOnly: true
            {{- end }}
            {{- range $i, $mount := .Values.extraMounts }}
            - name: extra-mount-{{ $i }}
              mountPath: /mnt/extra-{{ $i }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -d /proc/1 || exit 1"
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "claude --version > /dev/null 2>&1"
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
      volumes:
        - name: project-volume
          hostPath:
            path: {{ .Values.project.path }}
            type: Directory
        - name: claude-home
          emptyDir: {}
        {{- if .Values.claude.credentialsPath }}
        - name: claude-credentials
          hostPath:
            path: {{ .Values.claude.credentialsPath }}
            type: Directory
        {{- end }}
        {{- range $i, $mount := .Values.extraMounts }}
        - name: extra-mount-{{ $i }}
          hostPath:
            path: {{ $mount }}
            type: DirectoryOrCreate
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
