{{- if and .Values.apiKey (not .Values.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-code.fullname" . }}-api-key
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "claude-code.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.apiKey | quote }}
{{- end }}
